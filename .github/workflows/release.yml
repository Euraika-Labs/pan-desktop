name: Release

# M1.1-#002 (2026-04-12): triggered by semver tags pushed from the GitLab
# source-of-truth repo via .gitlab-ci.yml's publish-github-mirror-tag job.
# Each matrix job runs electron-builder with `--publish always`, which lets
# electron-builder upload artifacts directly to the GitHub Release using
# GITHUB_TOKEN (exposed to the binary as GH_TOKEN). No softprops step needed
# because electron-builder creates/updates the draft Release itself.
#
# The `publish: github` block in electron-builder.yml drives this. See
# docs/DECISIONS_M1.md §5 and the comment block in electron-builder.yml.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release_mac:
    name: Build macOS (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package and publish macOS artifacts
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac dmg zip --${{ matrix.arch }} --publish always

  release_linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package and publish Linux artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --linux AppImage deb --publish always

  release_win:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      # Two-step publish: package first (no upload), verify the native
      # binary is Windows PE format, THEN publish. Catches the
      # cross-build ABI regression that silently ships a Linux .node
      # inside an NSIS installer BEFORE the installer reaches users.
      # Reordered 2026-04-12 after code review caught that verification
      # was running post-publish (M1.1 quick-wins review, blocker W2).
      - name: Package Windows artifacts (no upload)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --win nsis --publish never

      - name: Verify better-sqlite3 is a Windows PE binary
        shell: pwsh
        run: |
          $candidates = Get-ChildItem -Recurse -Path dist -Filter "better_sqlite3.node" |
            Where-Object { $_.FullName -match 'app\.asar\.unpacked|win-unpacked' }
          if (-not $candidates) {
            throw "better_sqlite3.node not found under dist\win-unpacked or app.asar.unpacked"
          }
          if ($candidates.Count -gt 1) {
            Write-Warning "Multiple candidates found, verifying ALL of them"
          }
          foreach ($nodeFile in $candidates) {
            $bytes = [System.IO.File]::ReadAllBytes($nodeFile.FullName)[0..1]
            if ($bytes[0] -eq 0x4D -and $bytes[1] -eq 0x5A) {
              Write-Host "OK: $($nodeFile.FullName) is PE (Windows DLL format)"
            } else {
              throw "FAIL: $($nodeFile.FullName) has wrong magic bytes. Got 0x$($bytes[0].ToString('X2'))$($bytes[1].ToString('X2')), expected 0x4D5A (PE/MZ)."
            }
          }

      - name: Publish Windows artifacts to GitHub Release
        env:
          # M1 ships unsigned (Path A — see docs/DECISIONS_M1.md §4, M1.1-#001
          # closed as won't-fix 2026-04-12). NsisUpdater will trigger a UAC
          # prompt on every auto-update because it cannot silently apply
          # unsigned updates. Documented for users in README.md. When signing
          # activates post-M1, set WIN_CSC_LINK + WIN_CSC_KEY_PASSWORD as repo
          # secrets and remove CSC_IDENTITY_AUTO_DISCOVERY.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          # GITHUB_TOKEN has write access to releases because `permissions:
          # contents: write` is set at the workflow level — no extra PAT
          # required. electron-builder reads GH_TOKEN to upload artifacts
          # (and blockmaps + latest.yml) to the GitHub Release.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # electron-builder is idempotent for an already-packaged tree:
        # it detects the dist/win-unpacked already exists and only does
        # the publish step when called a second time with --publish always.
        run: npx electron-builder --win nsis --publish always
