name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "release/**"
      - "hotfix/**"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
          - ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify better-sqlite3 is Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $nodeFile = Get-ChildItem -Recurse -Path node_modules/better-sqlite3 -Filter "better_sqlite3.node" | Select-Object -First 1
          if (-not $nodeFile) { throw "better_sqlite3.node not found in node_modules/better-sqlite3/" }
          $bytes = [System.IO.File]::ReadAllBytes($nodeFile.FullName)[0..1]
          if ($bytes[0] -eq 0x4D -and $bytes[1] -eq 0x5A) {
            Write-Host "OK: better_sqlite3.node is PE (Windows DLL format)"
          } else {
            throw "FAIL: better_sqlite3.node has wrong magic bytes. Got 0x$($bytes[0].ToString('X2'))$($bytes[1].ToString('X2')), expected 0x4D5A (PE/MZ)."
          }

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        env:
          # M1 ships unsigned — prevent electron-builder from trying to auto-discover
          # a code signing identity during the verification build.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run build
