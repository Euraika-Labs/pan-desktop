afterPack: build/afterPack.js
appId: net.euraika.pandesktop
productName: Pan Desktop
directories:
  buildResources: build
files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.{js,ts,mjs,cjs}"
  - "!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
  - "!{.env,.env.*,.npmrc,pnpm-lock.yaml}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
# Note: no asarUnpack for resources/** — nothing under resources/ ships
# inside app.asar. install.ps1 (the only file in resources/) is delivered
# via extraResources below, which copies it to process.resourcesPath
# outside the asar entirely. Closes M1.1-#006.
extraResources:
  # Ship the vendored Hermes Agent PowerShell installer alongside the app.
  # At runtime the Windows install strategy resolves it via
  # `process.resourcesPath/install.ps1` in packaged builds and
  # `<repoRoot>/resources/install.ps1` in dev. See
  # `resources/install.ps1` header comment for the source commit SHA and
  # supply-chain rationale.
  - from: resources/install.ps1
    to: install.ps1
  # M1.1-#008 / #009: ship the Python overlay bundle that patches upstream
  # Hermes Agent's POSIX-only assumptions (fcntl file locking, AF_UNIX RPC
  # transport, /tmp file-upload path). Applied post-install by
  # `overlayApplicator.ts` with SHA256 match-before-replace drift
  # detection. See `resources/overlays/manifest.json` for the ticket map.
  - from: resources/overlays
    to: overlays
    filter:
      - "**/*"
win:
  executableName: pan-desktop
  requestedExecutionLevel: asInvoker
  target:
    - nsis
    - portable
  # Long-path manifest (longPathAware) is deferred to M1.1 — electron-builder
  # 26.x has no direct `manifest` key, requires mt.exe + afterPack injection.
  # See docs/WAVE_5_TO_9_PLAN.md Wave 6 gap #11 and M1_1_TICKETS.md
  # Code signing scaffold — activated in M1.1 when cert is acquired.
  # See docs/DECISIONS_M1.md §4 (Signing Path A) and DECISION_LOG.md 2026-04-10.
  # When activating: set WIN_CSC_LINK + WIN_CSC_KEY_PASSWORD as GitHub Actions secrets,
  # uncomment the sign block below, fill publisherName matching the cert CN.
  # sign:
  #   certificateFile: ${env.WIN_CSC_LINK}
  #   certificatePassword: ${env.WIN_CSC_KEY_PASSWORD}
  #   signingHashAlgorithms: [sha256]
  #   rfc3161TimeStampServer: http://timestamp.digicert.com
  # publisherName: Euraika Labs
nsis:
  oneClick: false
  perMachine: false
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
portable:
  artifactName: ${name}-${version}-portable.${ext}
mac:
  icon: build/icon.icns
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: euraika.net
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
# npmRebuild runs "electron-rebuild" during packaging to ensure native
# modules (better-sqlite3) are built against Electron's Node headers, not
# the host Node's. Flipped from false to true in Wave 6 to fix the
# ABI-mismatch issue that was masked by shipping the Linux-built .node on
# win32-x64. Consequence: Windows NSIS builds must now run on windows-latest
# CI, not on Linux hosts. Dev-loop cross-build on Linux still works via
# npm_config_runtime/platform/arch/target env vars — see DEVELOPER_WORKFLOW.md.
npmRebuild: true
# =============================================================================
# publish — electron-updater release channel
#
# M1.1-#002 (2026-04-12): switched from the broken `generic` provider pointed
# at GitLab Pages to the `github` provider pointed at the GitHub mirror.
#
# Why github, not gitlab:
#   electron-updater has no `gitlab` provider. The supported providers are
#   generic, github, s3, spaces, bitbucket, keygen. Generic-against-GitLab-Pages
#   was the prior attempt and failed (broken URL, silent first-launch failures).
#
# Why the mirror:
#   GitLab (git.euraika.net/euraika/pan-desktop) stays the source of truth for
#   code and MRs. The GitHub mirror (github.com/Euraika-Labs/pan-desktop) is the
#   binary distribution edge — zero hosting cost, unlimited public-release
#   bandwidth, and native blockmap delta + channel support via electron-updater.
#   GitLab CI pushes `v*` tags to the mirror; GitHub Actions builds and publishes
#   the installers from there. See .gitlab-ci.yml + .github/workflows/release.yml.
#
# UAC caveat:
#   Pan Desktop ships unsigned (M1.1-#001 code signing closed as won't-fix,
#   2026-04-12). Because NsisUpdater can only apply updates silently when the
#   new installer's Authenticode signature matches the installed version,
#   unsigned builds trigger a UAC prompt on every auto-update. This is
#   acceptable for pre-1.0 betas and is documented for users in README.md.
#   The code just does the wiring.
#
# See: docs/DECISIONS_M1.md §5, M1.1-#002 ticket.
# =============================================================================
publish:
  provider: github
  owner: Euraika-Labs
  repo: pan-desktop
  releaseType: release
  vPrefixedTagName: true
  publishAutoUpdate: true
